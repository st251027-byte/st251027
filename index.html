<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>かわいい ぷよぱずる</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cell-size: 30px;
            --cols: 6;
            --rows: 12;
            --board-width: calc(var(--cell-size) * var(--cols));
            --board-height: calc(var(--cell-size) * var(--rows));
        }

        @media (max-width: 400px) {
            :root {
                --cell-size: 26px;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            touch-action: none; /* スワイプ時のデフォルトスクロールを防止 */
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: radial-gradient(circle at 50% 0%, #2b2b40 0%, #0f0f1a 100%);
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Montserrat', 'Noto Sans JP', sans-serif;
            font-size: 1.8rem;
            color: #fff;
            letter-spacing: 4px;
            text-shadow: 0 0 10px #00f3ff, 0 0 20px #00f3ff;
            text-transform: uppercase;
        }

        .game-wrapper {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .ui-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 90px;
        }

        .panel-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px 5px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .panel-box h2 {
            font-size: 0.75rem;
            margin-bottom: 8px;
            color: #94a3b8;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .score-val {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #00f3ff;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
            transition: transform 0.2s;
        }

        .score-val.bump {
            transform: scale(1.3);
        }

        .next-preview {
            position: relative;
            height: calc(var(--cell-size) * 2.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ボード全体 */
        .board-container {
            position: relative;
            width: var(--board-width);
            height: var(--board-height);
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8), 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        /* グリッドマス目 */
        .grid {
            display: grid;
            grid-template-columns: repeat(var(--cols), var(--cell-size));
            grid-template-rows: repeat(var(--rows), var(--cell-size));
            position: absolute;
            top: 0; left: 0;
            pointer-events: none;
        }

        .grid-cell {
            width: var(--cell-size);
            height: var(--cell-size);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            border-right: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* ぷよ（ジェム/クリスタル風）のデザイン */
        .puyo {
            position: absolute;
            width: var(--cell-size);
            height: var(--cell-size);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s linear, border-radius 0.1s;
            z-index: 10;
        }

        /* 連結時の形変形 */
        .puyo.conn-t { border-top-left-radius: 2px; border-top-right-radius: 2px; }
        .puyo.conn-b { border-bottom-left-radius: 2px; border-bottom-right-radius: 2px; }
        .puyo.conn-l { border-top-left-radius: 2px; border-bottom-left-radius: 2px; }
        .puyo.conn-r { border-top-right-radius: 2px; border-bottom-right-radius: 2px; }

        /* ハイライト（ガラスの反射） */
        .puyo-highlight {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 50%);
            border-radius: inherit;
            top: 0;
            left: 0;
            box-shadow: inset 0 0 8px rgba(255,255,255,0.3);
            transform: none; /* 回転をリセット */
        }

        /* カラーバリエーション（ネオンカラー） */
        .color-1 { background-color: #ff007a; box-shadow: 0 0 10px #ff007a; } /* ネオンピンク */
        .color-2 { background-color: #00f3ff; box-shadow: 0 0 10px #00f3ff; } /* シアン */
        .color-3 { background-color: #39ff14; box-shadow: 0 0 10px #39ff14; } /* ライムグリーン */
        .color-4 { background-color: #fce803; box-shadow: 0 0 10px #fce803; } /* イエロー */

        /* ゴースト */
        .puyo.ghost {
            opacity: 0.2;
            box-shadow: none;
            z-index: 5;
            border: 1px solid rgba(255,255,255,0.5);
            background-color: transparent !important;
        }
        .puyo.ghost .puyo-highlight {
            display: none;
        }

        /* 消去時のアニメーション */
        .puyo.pop {
            animation: popAnim 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            z-index: 20;
        }

        @keyframes popAnim {
            0% { transform: scale(1); opacity: 1; filter: brightness(1); }
            50% { transform: scale(1.4) rotate(15deg); opacity: 0.8; filter: brightness(2); }
            100% { transform: scale(0) rotate(45deg); opacity: 0; filter: brightness(3); }
        }

        /* 連鎖エフェクト */
        .chain-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 10px #ff007a, 0 0 20px #ff007a, 0 0 30px #ff007a;
            pointer-events: none;
            z-index: 100;
            animation: floatUp 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            white-space: nowrap;
        }

        @keyframes floatUp {
            0% { transform: translate(-50%, -30%) scale(0.5) skewX(-10deg); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.2) skewX(0deg); opacity: 1; }
            80% { transform: translate(-50%, -60%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -80%) scale(0.8); opacity: 0; }
        }

        /* コントローラー */
        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 280px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px 0;
            font-size: 1.2rem;
            color: #e2e8f0;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(2px);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 2px 3px rgba(0,0,0,0.3);
        }

        .btn-large {
            grid-column: span 4;
            background: linear-gradient(90deg, #ff007a, #7a00ff);
            color: #fff;
            border: none;
            font-family: 'Noto Sans JP', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .btn-large:active {
            background: linear-gradient(90deg, #d60066, #6000c9);
        }

        /* モーダル画面 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 26, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: opacity 0.3s;
        }

        .modal {
            background: rgba(25, 30, 45, 0.7);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
            max-width: 90%;
            width: 320px;
        }

        .modal h2 {
            font-family: 'Montserrat', 'Noto Sans JP', sans-serif;
            color: #fff;
            font-size: 2rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00f3ff;
            letter-spacing: 2px;
        }

        .start-btn {
            background: #00f3ff;
            color: #0f0f1a;
            border: none;
            padding: 12px 40px;
            font-size: 1.2rem;
            border-radius: 8px;
            font-family: 'Noto Sans JP', sans-serif;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.6);
            margin-top: 20px;
            transition: all 0.2s;
            letter-spacing: 1px;
        }
        
        .start-btn:active {
            transform: translateY(2px) scale(0.98);
            box-shadow: 0 0 5px rgba(0, 243, 255, 0.6);
        }

        .hidden { display: none !important; }

    </style>
</head>
<body>

    <header>
        <h1>かわいい ぷよぱずる</h1>
    </header>

    <div class="game-wrapper">
        <div class="ui-panel">
            <div class="panel-box">
                <h2>スコア</h2>
                <div class="score-val" id="score">0</div>
            </div>
            <div class="panel-box">
                <h2>つぎ</h2>
                <div class="next-preview" id="next-box"></div>
            </div>
        </div>

        <div class="board-container" id="board">
            <!-- 背景グリッド -->
            <div class="grid" id="grid-bg"></div>
            <!-- 固定されたぷよ -->
            <div id="static-puyos"></div>
            
            <!-- アクティブ（操作中）ぷよ -->
            <div id="active-puyos">
                <div id="ghost-main" class="puyo ghost hidden"><div class="puyo-highlight"></div></div>
                <div id="ghost-sub" class="puyo ghost hidden"><div class="puyo-highlight"></div></div>
                <div id="puyo-main" class="puyo hidden"><div class="puyo-highlight"></div></div>
                <div id="puyo-sub" class="puyo hidden"><div class="puyo-highlight"></div></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" id="btn-left">◀</button>
        <button class="btn" id="btn-down">▼</button>
        <button class="btn" id="btn-right">▶</button>
        <button class="btn" id="btn-rotate">↻</button>
        <button class="btn btn-large" id="btn-drop">一気に落とす</button>
    </div>

    <!-- スタート / ゲームオーバー 画面 -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2 id="modal-title">ぷよぱずる</h2>
            <p style="color: #94a3b8; margin-bottom: 15px; font-size: 0.9rem; line-height: 1.5;">
                同じ色を4つ以上つなげて消そう！<br>
                <span style="color: #00f3ff;">【操作方法】</span><br>
                PC: 矢印キーで移動、上で回転<br>
                スマホ: 盤面をスワイプ＆タップ
            </p>
            <button class="start-btn" id="start-btn">START</button>
        </div>
    </div>

    <script>
        // === 定数 ===
        const COLS = 6;
        const ROWS = 12;
        const CELL_SIZE = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell-size')) || 30;
        const COLORS = 4;
        const POP_REQUIREMENT = 4;
        
        // === ゲーム状態 ===
        let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0)); // 0:空, 1-4:色
        let score = 0;
        let gameActive = false;
        let isAnimating = false;
        let dropInterval;
        let fallSpeed = 800;

        let currentPiece = null; 
        let nextPiece = null;

        // === DOM要素 ===
        const domBoard = document.getElementById('board');
        const domStatic = document.getElementById('static-puyos');
        const domScore = document.getElementById('score');
        const domNext = document.getElementById('next-box');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modal-title');

        const elMain = document.getElementById('puyo-main');
        const elSub = document.getElementById('puyo-sub');
        const elGhostMain = document.getElementById('ghost-main');
        const elGhostSub = document.getElementById('ghost-sub');

        // === 初期化 ===
        function initGrid() {
            const gridBg = document.getElementById('grid-bg');
            gridBg.innerHTML = '';
            for(let i=0; i<COLS*ROWS; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                gridBg.appendChild(cell);
            }
        }
        initGrid();

        const wait = ms => new Promise(res => setTimeout(res, ms));

        function getRandomColor() {
            return Math.floor(Math.random() * COLORS) + 1;
        }

        // === レンダリング ===
        function renderBoard() {
            domStatic.innerHTML = '';
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (board[y][x] !== 0) {
                        const color = board[y][x];
                        const p = document.createElement('div');
                        
                        // 連結判定（くっつき表現のクラス付与）
                        const classes = ['puyo', `color-${color}`];
                        if (y > 0 && board[y-1][x] === color) classes.push('conn-t');
                        if (y < ROWS - 1 && board[y+1][x] === color) classes.push('conn-b');
                        if (x > 0 && board[y][x-1] === color) classes.push('conn-l');
                        if (x < COLS - 1 && board[y][x+1] === color) classes.push('conn-r');

                        p.className = classes.join(' ');
                        p.id = `cell-${x}-${y}`;
                        p.style.transform = `translate(${x * CELL_SIZE}px, ${y * CELL_SIZE}px)`;
                        p.innerHTML = '<div class="puyo-highlight"></div>';
                        domStatic.appendChild(p);
                    }
                }
            }
        }

        function updateActivePiece() {
            if (!currentPiece) {
                elMain.classList.add('hidden'); elSub.classList.add('hidden');
                elGhostMain.classList.add('hidden'); elGhostSub.classList.add('hidden');
                return;
            }

            // 操作中ぷよの連結判定
            let mainClasses = `puyo color-${currentPiece.mainColor}`;
            let subClasses = `puyo color-${currentPiece.subColor}`;
            
            if (currentPiece.mainColor === currentPiece.subColor) {
                if (currentPiece.rot === 0) { mainClasses += ' conn-t'; subClasses += ' conn-b'; }
                if (currentPiece.rot === 1) { mainClasses += ' conn-r'; subClasses += ' conn-l'; }
                if (currentPiece.rot === 2) { mainClasses += ' conn-b'; subClasses += ' conn-t'; }
                if (currentPiece.rot === 3) { mainClasses += ' conn-l'; subClasses += ' conn-r'; }
            }

            elMain.classList.remove('hidden');
            elMain.className = mainClasses;
            elMain.style.transform = `translate(${currentPiece.x * CELL_SIZE}px, ${currentPiece.y * CELL_SIZE}px)`;

            elSub.classList.remove('hidden');
            elSub.className = subClasses;
            elSub.style.transform = `translate(${currentPiece.subX * CELL_SIZE}px, ${currentPiece.subY * CELL_SIZE}px)`;

            // ゴースト
            const ghost = calculateGhost();
            elGhostMain.classList.remove('hidden');
            elGhostMain.className = `puyo ghost color-${currentPiece.mainColor}`;
            elGhostMain.style.transform = `translate(${ghost.x * CELL_SIZE}px, ${ghost.y * CELL_SIZE}px)`;

            elGhostSub.classList.remove('hidden');
            elGhostSub.className = `puyo ghost color-${currentPiece.subColor}`;
            elGhostSub.style.transform = `translate(${ghost.subX * CELL_SIZE}px, ${ghost.subY * CELL_SIZE}px)`;
        }

        function calculateGhost() {
            let gy = currentPiece.y;
            let gSubY = currentPiece.subY;
            
            while (true) {
                if (!isValidPos(currentPiece.x, gy + 1) || !isValidPos(currentPiece.subX, gSubY + 1)) break;
                gy++;
                gSubY++;
            }
            return { x: currentPiece.x, y: gy, subX: currentPiece.subX, subY: gSubY };
        }

        function renderNext() {
            domNext.innerHTML = '';
            if (nextPiece) {
                let mainClasses = `puyo color-${nextPiece.mainColor}`;
                let subClasses = `puyo color-${nextPiece.subColor}`;
                
                if (nextPiece.mainColor === nextPiece.subColor) {
                    mainClasses += ' conn-t';
                    subClasses += ' conn-b';
                }

                const s = document.createElement('div');
                s.className = subClasses;
                s.style.transform = `translate(0px, -15px)`;
                s.innerHTML = '<div class="puyo-highlight"></div>';
                
                const m = document.createElement('div');
                m.className = mainClasses;
                m.style.transform = `translate(0px, 15px)`;
                m.innerHTML = '<div class="puyo-highlight"></div>';
                
                domNext.appendChild(s);
                domNext.appendChild(m);
            }
        }

        // === ゲームロジック ===
        function startGame() {
            board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
            score = 0;
            updateScoreDisplay();
            gameActive = true;
            isAnimating = false;
            fallSpeed = 800;
            
            nextPiece = { mainColor: getRandomColor(), subColor: getRandomColor() };
            renderBoard();
            spawnPiece();
            
            modal.classList.add('hidden');
            if (dropInterval) clearInterval(dropInterval);
            dropInterval = setInterval(autoDrop, fallSpeed);
        }

        function gameOver() {
            gameActive = false;
            clearInterval(dropInterval);
            modalTitle.innerText = "ゲームオーバー";
            modal.classList.remove('hidden');
        }

        function spawnPiece() {
            const startX = 2;
            const startY = 1;

            if (board[startY][startX] !== 0 || board[startY-1][startX] !== 0) {
                gameOver();
                return;
            }

            currentPiece = {
                x: startX, y: startY,
                subX: startX, subY: startY - 1,
                mainColor: nextPiece.mainColor, subColor: nextPiece.subColor,
                rot: 0
            };

            nextPiece = { mainColor: getRandomColor(), subColor: getRandomColor() };
            renderNext();
            updateActivePiece();
        }

        // --- 操作 ---
        function isValidPos(x, y) {
            if (x < 0 || x >= COLS || y >= ROWS) return false;
            if (y >= 0 && board[y][x] !== 0) return false;
            return true;
        }

        function move(dx, dy) {
            if (!gameActive || isAnimating || !currentPiece) return false;
            
            if (isValidPos(currentPiece.x + dx, currentPiece.y + dy) && 
                isValidPos(currentPiece.subX + dx, currentPiece.subY + dy)) {
                
                currentPiece.x += dx;
                currentPiece.y += dy;
                currentPiece.subX += dx;
                currentPiece.subY += dy;
                updateActivePiece();
                return true;
            }
            return false;
        }

        function rotate() {
            if (!gameActive || isAnimating || !currentPiece) return;

            const nextRot = (currentPiece.rot + 1) % 4;
            let nx = currentPiece.x, ny = currentPiece.y;

            if (nextRot === 0) ny--;      // 上
            else if (nextRot === 1) nx++; // 右
            else if (nextRot === 2) ny++; // 下
            else if (nextRot === 3) nx--; // 左

            // 壁蹴り・他ブロック回避（より本家っぽく）
            if (!isValidPos(nx, ny)) {
                if (nx < 0) { nx++; currentPiece.x++; currentPiece.subX++; } // 左壁
                else if (nx >= COLS) { nx--; currentPiece.x--; currentPiece.subX--; } // 右壁
                else if (ny >= ROWS || (ny >= 0 && board[ny][nx] !== 0)) {
                    // 下の床やブロックにぶつかる場合、軸を上に持ち上げる
                    ny--; currentPiece.y--; currentPiece.subY--;
                }
            }

            if (!isValidPos(currentPiece.x, currentPiece.y) || !isValidPos(nx, ny)) {
                // 回避しきれなかった場合は回転キャンセルして位置を元に戻す処理（今回はシンプルにキャンセル）
                return;
            }

            currentPiece.subX = nx;
            currentPiece.subY = ny;
            currentPiece.rot = nextRot;
            updateActivePiece();
        }

        function hardDrop() {
            if (!gameActive || isAnimating || !currentPiece) return;
            const ghost = calculateGhost();
            currentPiece.x = ghost.x;
            currentPiece.y = ghost.y;
            currentPiece.subX = ghost.subX;
            currentPiece.subY = ghost.subY;
            updateActivePiece();
            lockPiece();
        }

        function autoDrop() {
            if (!gameActive || isAnimating) return;
            if (!move(0, 1)) lockPiece();
        }

        // --- 固定と連鎖 ---
        async function lockPiece() {
            isAnimating = true;
            clearInterval(dropInterval);

            if (currentPiece.y >= 0) board[currentPiece.y][currentPiece.x] = currentPiece.mainColor;
            if (currentPiece.subY >= 0) board[currentPiece.subY][currentPiece.subX] = currentPiece.subColor;
            
            currentPiece = null;
            updateActivePiece();
            renderBoard();

            await resolveChains();

            if (gameActive) {
                spawnPiece();
                isAnimating = false;
                dropInterval = setInterval(autoDrop, fallSpeed);
            }
        }

        async function applyGravity() {
            let dropped = false;
            for (let x = 0; x < COLS; x++) {
                for (let y = ROWS - 1; y >= 0; y--) {
                    if (board[y][x] === 0) continue;
                    let targetY = y;
                    while (targetY + 1 < ROWS && board[targetY + 1][x] === 0) {
                        targetY++;
                    }
                    if (targetY !== y) {
                        board[targetY][x] = board[y][x];
                        board[y][x] = 0;
                        dropped = true;
                    }
                }
            }
            if (dropped) {
                renderBoard();
                await wait(250);
            }
            return dropped;
        }

        function findMatches() {
            const visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
            const matches = [];

            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (board[y][x] === 0 || visited[y][x]) continue;

                    const color = board[y][x];
                    const group = [];
                    const queue = [{x, y}];
                    visited[y][x] = true;

                    while (queue.length > 0) {
                        const curr = queue.shift();
                        group.push(curr);

                        const dirs = [[0,-1], [1,0], [0,1], [-1,0]];
                        for (let [dx, dy] of dirs) {
                            let nx = curr.x + dx, ny = curr.y + dy;
                            if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS) {
                                if (!visited[ny][nx] && board[ny][nx] === color) {
                                    visited[ny][nx] = true;
                                    queue.push({x: nx, y: ny});
                                }
                            }
                        }
                    }
                    if (group.length >= POP_REQUIREMENT) {
                        matches.push(group);
                    }
                }
            }
            return matches;
        }

        function updateScoreDisplay() {
            domScore.innerText = score;
            domScore.classList.remove('bump');
            void domScore.offsetWidth; // リフロー強制
            domScore.classList.add('bump');
        }

        async function resolveChains() {
            let chain = 0;
            while (true) {
                await applyGravity();
                const matches = findMatches();
                if (matches.length === 0) break;
                
                chain++;
                let popCount = 0;
                
                matches.forEach(group => {
                    popCount += group.length;
                    group.forEach(p => {
                        const el = document.getElementById(`cell-${p.x}-${p.y}`);
                        if (el) el.classList.add('pop');
                        board[p.y][p.x] = 0; 
                    });
                });

                if (chain > 1) {
                    const msg = document.createElement('div');
                    msg.className = 'chain-text';
                    msg.innerText = `${chain}連鎖!!`;
                    domBoard.appendChild(msg);
                    setTimeout(() => msg.remove(), 1200);
                }

                const multiplier = chain === 1 ? 1 : (chain - 1) * 8;
                score += popCount * 10 * multiplier;
                updateScoreDisplay();

                if (score > 1000 && fallSpeed > 500) fallSpeed = 600;
                if (score > 3000 && fallSpeed > 300) fallSpeed = 400;

                await wait(400); 
                renderBoard(); 
            }
        }

        // === イベントリスナー ===
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') move(-1, 0);
            if (e.key === 'ArrowRight') move(1, 0);
            if (e.key === 'ArrowDown') move(0, 1);
            if (e.key === 'ArrowUp') rotate();
            if (e.key === ' ') hardDrop();
        });

        // ボタン操作
        const attachBtn = (id, action) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', e => { e.preventDefault(); action(); }, {passive: false});
            btn.addEventListener('mousedown', e => { e.preventDefault(); action(); });
        };

        attachBtn('btn-left', () => move(-1, 0));
        attachBtn('btn-right', () => move(1, 0));
        attachBtn('btn-down', () => move(0, 1));
        attachBtn('btn-rotate', rotate);
        attachBtn('btn-drop', hardDrop);

        // ボード上のスワイプ・タッチ操作
        let touchStartX = 0, touchStartY = 0, touchLastX = 0, touchLastY = 0, touchStartTime = 0;

        domBoard.addEventListener('touchstart', e => {
            if (!gameActive || isAnimating) return;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchLastX = touchStartX;
            touchLastY = touchStartY;
            touchStartTime = Date.now();
        }, {passive: false});

        domBoard.addEventListener('touchmove', e => {
            if (!gameActive || isAnimating || !currentPiece) return;
            e.preventDefault();
            const currentX = e.touches[0].clientX;
            const currentY = e.touches[0].clientY;
            const dx = currentX - touchLastX;
            const dy = currentY - touchLastY;
            
            // 横移動（感度調整）
            if (Math.abs(dx) > CELL_SIZE * 0.8) {
                move(Math.sign(dx), 0);
                touchLastX = currentX;
            }
            // 下移動
            if (dy > CELL_SIZE * 0.8) {
                move(0, 1);
                touchLastY = currentY;
            }
        }, {passive: false});

        domBoard.addEventListener('touchend', e => {
            if (!gameActive || isAnimating) return;
            const duration = Date.now() - touchStartTime;
            const totalDx = touchLastX - touchStartX;
            const totalDy = touchLastY - touchStartY;
            
            // タップ判定で回転
            if (duration < 250 && Math.abs(totalDx) < 15 && Math.abs(totalDy) < 15) {
                rotate();
            } 
            // フリックダウン判定でハードドロップ
            else if (duration < 300 && totalDy > 60) {
                hardDrop();
            }
        });

        document.getElementById('start-btn').addEventListener('click', startGame);

    </script>
</body>
</html>
